name: Atualizar Bolão

on:
  push:
    paths:
      - "BOLAO.xlsx"   # Dispara SOMENTE quando o Excel for enviado

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install pandas openpyxl

      - name: Gerar results.json a partir do Excel
        run: python extract.py

      - name: Commitar results.json atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --cached --quiet || git commit -m "🤖 Atualiza results.json via planilha"
          git push
